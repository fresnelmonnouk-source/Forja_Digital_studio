name: CI

# Vérifie automatiquement chaque push et chaque pull request :
# installation → tests → build (qui inclut lint + vérification des types).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests (Jest)
        run: npx jest --ci

      - name: Build (lint + typecheck + build)
        run: npx next build
        env:
          # Valeurs factices : le build ne se connecte à rien (clients paresseux),
          # mais on fournit le minimum pour éviter toute validation au build.
          NEXTAUTH_SECRET: ci_dummy_secret_at_least_32_characters_long
          NEXTAUTH_URL: http://localhost:3000
